<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ Generador de Sensibilidad - Free Fire</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Rajdhani', sans-serif;
        }
        
        body {
            background: radial-gradient(circle at 50% 0%, #1a233a 0%, #080914 70%, #030408 100%);
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        h1 { 
            font-family: 'Orbitron', sans-serif;
            color: #ff5500; 
            margin-bottom: 5px;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255, 85, 0, 0.4);
        }
        
        .sub {
            color: #7e8da2;
            margin-top: 0;
            font-size: 14px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .panel-container {
            background: linear-gradient(135deg, rgba(20, 20, 35, 0.85) 0%, rgba(12, 12, 22, 0.95) 100%);
            border: 1px solid rgba(255, 85, 0, 0.15);
            border-radius: 20px;
            max-width: 450px;
            margin: 0 auto;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
        }

        .opcion-grupo {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #ffaa00;
            font-weight: 700;
            font-size: 16px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        select {
            width: 100%;
            background: #090a12;
            border: 1px solid #252845;
            color: #fff;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            outline: none;
            cursor: pointer;
        }

        /* --- ESTILO PARA BOTONES MODO --- */
        .modos-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 5px;
        }
        
        .btn-modo {
            background: #0f1122;
            border: 1px solid #252845;
            color: #8fa3be;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .btn-modo.seleccionado {
            background: linear-gradient(135deg, #ff5500 0%, #cc1100 100%);
            color: #fff;
            border: none;
            box-shadow: 0 0 15px rgba(255, 50, 0, 0.4);
        }

        .btn-generar {
            width: 100%;
            background: linear-gradient(90deg, #ff8800, #ff3300);
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(255, 68, 0, 0.3);
            transition: transform 0.2s;
        }
        .btn-generar:active { transform: scale(0.98); }

        /* --- MODAL ESTILO CATCH --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #0a0a0f;
            border: 1px solid #222;
            border-radius: 24px;
            width: 90%;
            max-width: 350px;
            padding: 20px;
            text-align: left;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .modal-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            text-align: center;
            margin-bottom: 15px;
            text-transform: uppercase;
            border-bottom: 1px solid #151525;
            padding-bottom: 10px;
        }
        .sens-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #12121f;
            font-size: 15px;
        }
        .sens-label { color: #ff3b3b; font-weight: 700; text-transform: uppercase; }
        .sens-value { color: #00ffaa; font-family: monospace; font-weight: bold; }

        .btn-close {
            width: 100%;
            background: #15151c;
            color: #fff;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h1>⚙️ CONFIG_SENS GENERATOR ⚙️</h1>
    <p class="sub">Ajusta tu dispositivo para dar todo capa</p>

    <div class="panel-container">
        <div class="opcion-grupo">
            <label>Dispositivo:</label>
            <select id="selectDispositivo">
                <option value="android">Android (Gama Baja / Media)</option>
                <option value="ios">iOS (iPhone / iPad)</option>
                <option value="emulador">PC (Emulador)</option>
            </select>
        </div>

        <div class="opcion-grupo">
            <label>Uso de DPI:</label>
            <select id="selectDpi">
                <option value="si">Sí (Recomendar DPI)</option>
                <option value="no">No DPI (Dejar de fábrica)</option>
            </select>
        </div>

        <div class="opcion-grupo">
            <label>Modo de Disparo:</label>
            <div class="modos-grid">
                <div class="btn-modo seleccionado" onclick="cambiarModo('alta', this)">⚡ Alta Sensibilidad (Full Rojo)</div>
                <div class="btn-modo" onclick="cambiarModo('precision', this)">🎯 Alta Precisión (Mira Estable)</div>
                <div class="btn-modo" onclick="cambiarModo('baja', this)">📉 Sensibilidad Baja (Estable)</div>
            </div>
        </div>

        <button class="btn-generar" onclick="generarConfig()">Generar Sensibilidad</button>
    </div>

    <div id="resultadoModal" class="modal">
        <div class="modal-content">
            <div class="modal-title" id="txtModoTitulo">Configuración</div>
            
            <div class="sens-row"><span class="sens-label">General:</span><span id="vGen" class="sens-value">0</span></div>
            <div class="sens-row"><span class="sens-label">Punto Rojo:</span><span id="vMira1" class="sens-value">0</span></div>
            <div class="sens-row"><span class="sens-label">Mira X2:</span><span id="vMira2" class="sens-value">0</span></div>
            <div class="sens-row"><span class="sens-label">Mira X4:</span><span id="vMira4" class="sens-value">0</span></div>
            <div class="sens-row"><span class="sens-label">Franco:</span><span id="vFranco" class="sens-value">0</span></div>
            <div class="sens-row"><span class="sens-label">Cámara:</span><span id="vCamara" class="sens-value">0</span></div>
            
            <div class="sens-row" id="filaDpi"><span class="sens-label">DPI Recomendado:</span><span id="vDpi" class="sens-value">0</span></div>
            <div class="sens-row"><span class="sens-label">Botón de Disparo:</span><span id="vBoton" class="sens-value">0</span></div>

            <button class="btn-close" onclick="cerrarModal()">Cerrar Ajustes</button>
        </div>
    </div>

    <script src="sens.js"></script>
</body>
</html>
